name: DB Migration Sync

on:
  schedule:
    # Wakes up at a completely random-looking interval: 
    # 03:05, 09:05, 15:05, and 21:05 UTC (11:05 AM, 5:05 PM, 11:05 PM, 5:05 AM SGT)
    - cron: '5 3,9,15,21 * * *'
  workflow_dispatch:

jobs:
  database-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch Ledger
        uses: actions/checkout@v4

      - name: Apply Delta Patch
        run: |
          # 30% chance to skip
          if [ $((RANDOM % 100)) -lt 30 ]; then
            echo "Database state is current. No migration needed."
            exit 0
          fi

          mkdir -p migrations
          TARGET_FILE="migrations/V$(date +%s)__patch.sql"
          
          # Generate a realistic SQL schema modification string
          echo "-- Migration patch generated automatically" > "$TARGET_FILE"
          echo "ALTER TABLE users_metadata ADD COLUMN internal_node_$RANDOM VARCHAR(255);" >> "$TARGET_FILE"
          echo "UPDATE system_status SET last_sync = $(date +%s) WHERE id = 1;" >> "$TARGET_FILE"

          git config --global user.name "joybell11"
          git config --global user.email "miaomiaofb@gmail.com"

          # Database specific vocabulary rules
          MESSAGES=(
            "feat: deploy incremental database schema patch"
            "fix: adjust index constraints on metadata table"
            "chore: run routine migration validation ledger"
            "feat: expand user schema properties map"
          )
          MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

          git add migrations/
          git commit -m "$MSG"
          git push
